<div class="min-vh-100 d-flex align-items-center justify-content-center">
  <div class="card shadow-sm" style="width: 100%; max-width: 400px;">
    <div class="card-body p-4">
      <h2 class="card-title text-center mb-4">Reset password</h2>

      <ng-container *ngIf="!success; else successTpl">
        <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

        <form [formGroup]="form" (ngSubmit)="onSubmit()" *ngIf="token">
          <div class="mb-3">
            <label for="password" class="form-label">New password</label>
            <input
              id="password"
              type="password"
              class="form-control"
              formControlName="password"
              [class.is-invalid]="form.get('password')?.invalid && form.get('password')?.touched"
            />
            <div class="invalid-feedback">Password must be at least 8 characters.</div>
          </div>

          <div class="mb-4">
            <label for="confirmPassword" class="form-label">Confirm new password</label>
            <input
              id="confirmPassword"
              type="password"
              class="form-control"
              formControlName="confirmPassword"
              [class.is-invalid]="
                (form.get('confirmPassword')?.invalid || form.hasError('passwordMismatch'))
                && form.get('confirmPassword')?.touched
              "
            />
            <div class="invalid-feedback">
              <span *ngIf="form.get('confirmPassword')?.errors?.['minlength']">
                Password must be at least 8 characters.
              </span>
              <span *ngIf="form.hasError('passwordMismatch') && !form.get('confirmPassword')?.errors?.['minlength']">
                Passwords do not match.
              </span>
            </div>
          </div>

          <button type="submit" class="btn btn-primary w-100" [disabled]="loading">
            <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
            Reset password
          </button>
        </form>
      </ng-container>

      <ng-template #successTpl>
        <div class="text-center py-3">
          <p class="text-success mb-1">Your password has been reset.</p>
          <p class="text-body-secondary">Redirecting you to sign in...</p>
        </div>
      </ng-template>

      <p class="text-center mt-3 mb-0">
        <a routerLink="/auth/login">Back to sign in</a>
      </p>
    </div>
  </div>
</div>
