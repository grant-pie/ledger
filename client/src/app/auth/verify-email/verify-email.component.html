<div class="min-vh-100 d-flex align-items-center justify-content-center bg-light">
  <div class="card shadow-sm text-center" style="width: 100%; max-width: 400px;">
    <div class="card-body p-5">

      <!-- Verifying -->
      <ng-container *ngIf="state === 'verifying'">
        <div class="spinner-border text-primary mb-3" role="status"></div>
        <p class="text-muted mb-0">Verifying your email…</p>
      </ng-container>

      <!-- Success -->
      <ng-container *ngIf="state === 'success'">
        <div class="mb-3" style="font-size: 3rem;">✅</div>
        <h4 class="mb-2">Email verified!</h4>
        <p class="text-muted">Your account is active. Redirecting you to the dashboard…</p>
      </ng-container>

      <!-- Error -->
      <ng-container *ngIf="state === 'error'">
        <div class="mb-3" style="font-size: 3rem;">❌</div>
        <h4 class="mb-2">Verification failed</h4>
        <p class="text-muted mb-4">{{ errorMessage }}</p>
        <a routerLink="/auth/register" class="btn btn-primary">Register again</a>
      </ng-container>

    </div>
  </div>
</div>
